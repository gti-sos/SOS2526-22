name: CI_CD
on: 
  pull_request:
    branches: [ main ]  
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install dependences
        run: npm install
      - name: Build UI
        run: npm run build
      - name: Tests
        run: npm test